<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
        <meta http-equiv="Pragma" content="no-cache">
        <meta http-equiv="Expires" content="0">
        <title>★</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <canvas id="fx-canvas"></canvas>
        <main id="stage">
            <div id="card">
                <span class="badge">★</span>
                <span class="squiggle"></span>
                <h1 id="message"></h1>
                <a id="portal-btn" href="#" target="_blank" rel="noopener noreferrer"></a>
            </div>
            <div id="cookie-gate" role="button" tabindex="0" aria-label="Tap to crack open your fortune">
                <div class="cookie-half gate-left"></div>
                <div class="cookie-half gate-right"></div>
                <p class="tap-hint">tap to crack</p>
            </div>
        </main>
        <script src="script.js"></script>
    </body>
</html>
